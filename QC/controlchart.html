<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Control Chart - 2 Panel</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a0ca3;
            --success: #2dc653;
            --danger: #ef233c;
            --warning: #f59e0b;
            --warning-hover: #d97706;
            --bg-color: #f4f7fe;
            --card-bg: #ffffff;
            --text-main: #2b2d42;
            --text-muted: #8d99ae;
            --border-color: #e2e8f0;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
        }

        /* Header */
        .header {
            margin-bottom: 20px;
            padding-left: 10px;
        }

        .header h1 { margin: 0; font-size: 24px; color: var(--text-main); }
        .header p { margin: 2px 0 0; color: var(--text-muted); font-size: 14px; }

        /* Layout Utama - 2 Panel */
        .dashboard-layout {
            display: grid;
            grid-template-columns: 320px 1fr; 
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
        }

        /* --- PANEL KIRI: Input Data --- */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .inputs {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px;
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 5px;
        }

        .inputs::-webkit-scrollbar { width: 5px; }
        .inputs::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 5px; }
        .inputs::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }

        .inputs input {
            padding: 10px 5px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-align: center;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
            background: #f8fafc;
            width: 100%;
        }

        .inputs input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
            background: #fff;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
            width: 100%;
            font-size: 13px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        button:active { transform: scale(0.98); }

        .btn-random { background-color: var(--warning); color: white; }
        .btn-random:hover { background-color: var(--warning-hover); }

        .btn-reset { background-color: #f1f5f9; color: var(--text-main); }
        .btn-reset:hover { background-color: #e2e8f0; }

        .btn-export { background-color: var(--primary); color: white; }
        .btn-export:hover { background-color: var(--primary-hover); }

        /* --- PANEL KANAN: Statistik & Grafik --- */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .stat-box {
            background: #f8fafc;
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: 0.3s;
        }
        
        .stat-box.ucl, .stat-box.lcl { border-left-color: var(--danger); }
        
        .stat-title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .stat-value { font-size: 22px; font-weight: 700; color: var(--text-main); margin-top: 4px; }

        .chart-wrapper {
            flex-grow: 1;
            min-height: 450px;
            display: flex;
            flex-direction: column;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 100%;
            flex-grow: 1;
        }

        /* Responsivitas */
        @media(max-width: 992px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            .inputs { grid-template-columns: repeat(5, 1fr); max-height: none; }
            .button-group { flex-direction: row; flex-wrap: wrap; }
            .button-group button { flex: 1; min-width: 140px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .chart-wrapper { min-height: 350px; }
        }

        @media(max-width: 600px) {
            .inputs { grid-template-columns: repeat(3, 1fr); }
            .stats-grid { grid-template-columns: 1fr; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Control Chart Analytics</h1>
    <p>Monitor variasi proses secara interaktif dan real-time</p>
</div>

<div class="dashboard-layout">
    
    <div class="left-panel card">
        <div class="panel-title">✍️ Input Data (Poin 1-20)</div>
        <div class="inputs" id="inputContainer"></div>
        
        <div class="button-group">
            <button class="btn-random" onclick="randomizeData()">🎲 Acak Data</button>
            <button class="btn-reset" onclick="resetData()">⟲ Reset Data</button>
            <button class="btn-export" onclick="exportPNG()">📥 Ekspor PNG</button>
        </div>
    </div>

    <div class="right-panel">
        
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-title">Mean (Rata-rata)</div>
                <div class="stat-value" id="val-mean">0.00</div>
            </div>
            <div class="stat-box">
                <div class="stat-title">Standar Deviasi (σ)</div>
                <div class="stat-value" id="val-sd">0.00</div>
            </div>
            <div class="stat-box ucl">
                <div class="stat-title">UCL (+3σ)</div>
                <div class="stat-value" id="val-ucl" style="color: var(--danger)">0.00</div>
            </div>
            <div class="stat-box lcl">
                <div class="stat-title">LCL (-3σ)</div>
                <div class="stat-value" id="val-lcl" style="color: var(--danger)">0.00</div>
            </div>
        </div>

        <div class="chart-wrapper card">
            <div class="panel-title" style="margin-bottom: 10px; border: none; padding: 0;">📈 Visualisasi Control Chart</div>
            <div class="chart-container">
                <canvas id="controlChart"></canvas>
            </div>
        </div>

    </div>

</div>

<script>
    const inputContainer = document.getElementById("inputContainer");
    const maxPoints = 20;

    // Membuat input dinamis
    for(let i = 1; i <= maxPoints; i++) {
        let input = document.createElement("input");
        input.type = "number";
        input.placeholder = "P-" + i;
        input.oninput = updateChart;
        inputContainer.appendChild(input);
    }

    const ctx = document.getElementById("controlChart").getContext("2d");

    // Plugin untuk background putih saat export PNG
    const customCanvasBackgroundColor = {
        id: 'customCanvasBackgroundColor',
        beforeDraw: (chart, args, options) => {
            const {ctx} = chart;
            ctx.save();
            ctx.globalCompositeOperation = 'destination-over';
            ctx.fillStyle = options.color || '#ffffff';
            ctx.fillRect(0, 0, chart.width, chart.height);
            ctx.restore();
        }
    };

    let chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array.from({length: maxPoints}, (_, i) => "T-" + (i + 1)),
            datasets: [
                {
                    label: 'Nilai Aktual',
                    data: [],
                    borderColor: '#4361ee',
                    backgroundColor: 'rgba(67, 97, 238, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 4,
                    pointHoverRadius: 7,
                    borderWidth: 2
                },
                {
                    label: 'Mean',
                    data: [],
                    borderColor: '#2dc653',
                    borderDash: [5, 5],
                    pointRadius: 0,
                    borderWidth: 2
                },
                {
                    label: 'UCL',
                    data: [],
                    borderColor: '#ef233c',
                    borderDash: [8, 4],
                    pointRadius: 0,
                    borderWidth: 1.5
                },
                {
                    label: 'LCL',
                    data: [],
                    borderColor: '#ef233c',
                    borderDash: [8, 4],
                    pointRadius: 0,
                    borderWidth: 1.5
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8, font: {family: 'Poppins'} } },
                tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', padding: 12, cornerRadius: 8, titleFont: {family: 'Poppins'}, bodyFont: {family: 'Poppins'} },
                customCanvasBackgroundColor: { color: '#ffffff' }
            },
            scales: {
                y: { grid: { color: '#f1f5f9' }, border: { dash: [4, 4] }, ticks: {font: {family: 'Poppins'}} },
                x: { grid: { display: false }, ticks: {font: {family: 'Poppins'}} }
            }
        },
        plugins: [customCanvasBackgroundColor]
    });

    function updateChart() {
        let inputs = document.querySelectorAll(".inputs input");
        let values = [];

        inputs.forEach(input => {
            if(input.value !== "") {
                values.push(parseFloat(input.value));
            }
        });

        if(values.length < 2) {
            resetStats();
            chart.data.datasets.forEach(ds => ds.data = []);
            if (values.length === 1) {
                chart.data.datasets[0].data = [values[0]];
            }
            chart.update('none');
            return;
        }

        let mean = values.reduce((a, b) => a + b, 0) / values.length;
        let variance = values.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / (values.length - 1);
        let sd = Math.sqrt(variance);
        let UCL = mean + (3 * sd);
        let LCL = mean - (3 * sd);

        document.getElementById("val-mean").innerText = mean.toFixed(2);
        document.getElementById("val-sd").innerText = sd.toFixed(2);
        document.getElementById("val-ucl").innerText = UCL.toFixed(2);
        document.getElementById("val-lcl").innerText = LCL.toFixed(2);

        let fullData = Array(maxPoints).fill(null);
        let pointColors = [];
        let pointRadii = [];

        for(let i = 0; i < values.length; i++) {
            let val = values[i];
            fullData[i] = val;
            
            if(val > UCL || val < LCL) {
                pointColors.push('#ef233c');
                pointRadii.push(6);
            } else {
                pointColors.push('#4361ee');
                pointRadii.push(4);
            }
        }

        chart.data.datasets[0].data = fullData;
        chart.data.datasets[0].pointBackgroundColor = pointColors;
        chart.data.datasets[0].pointBorderColor = pointColors;
        chart.data.datasets[0].pointRadius = pointRadii;
        
        chart.data.datasets[1].data = Array(maxPoints).fill(mean);
        chart.data.datasets[2].data = Array(maxPoints).fill(UCL);
        chart.data.datasets[3].data = Array(maxPoints).fill(LCL);

        // Update dengan sedikit animasi khusus untuk randomize
        chart.update();
    }

    // Fungsi Baru: Menghasilkan data acak (10 - 100)
    function randomizeData() {
        let inputs = document.querySelectorAll(".inputs input");
        inputs.forEach(input => {
            // Angka acak antara 10 dan 100
            let randomNum = Math.floor(Math.random() * (100 - 10 + 1)) + 10;
            // Menambahkan sedikit outlier secara acak agar UCL/LCL terkadang tertembus
            if(Math.random() > 0.9) {
                randomNum += Math.floor(Math.random() * 50) + 20; 
            }
            input.value = randomNum;
        });
        updateChart();
    }

    function resetStats() {
        document.getElementById("val-mean").innerText = "0.00";
        document.getElementById("val-sd").innerText = "0.00";
        document.getElementById("val-ucl").innerText = "0.00";
        document.getElementById("val-lcl").innerText = "0.00";
    }

    function resetData() {
        document.querySelectorAll(".inputs input").forEach(input => input.value = "");
        resetStats();
        chart.data.datasets.forEach(ds => ds.data = []);
        chart.update();
    }

    function exportPNG() {
        let link = document.createElement('a');
        link.download = 'Laporan-Control-Chart.png';
        link.href = document.getElementById('controlChart').toDataURL('image/png', 1.0);
        link.click();
    }
</script>

</body>
</html>
